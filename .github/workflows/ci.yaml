name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go mod tidy && git diff --exit-code
      - run: make lint
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check ml/
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/k8s-sage/
      - name: Unit tests
        run: go test -p 4 -timeout 120s -race -count=1 ./...
      - name: Generate coverage
        run: go test -p 4 -timeout 120s -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  backtest:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: make backtest
      - run: make test-safety

  integration:
    runs-on: ubuntu-latest
    needs: backtest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: helm/kind-action@v1
      - run: make docker-build
      - run: make dev-deploy
      - run: make test-integration
