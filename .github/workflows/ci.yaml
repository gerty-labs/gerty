name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go mod tidy && git diff --exit-code
      - run: make lint
      - run: make test

  backtest:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: make backtest
      - run: make test-safety

  integration:
    runs-on: ubuntu-latest
    needs: backtest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: helm/kind-action@v1
      - run: make docker-build
      - run: make dev-deploy
      - run: make test-integration
