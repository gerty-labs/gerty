name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep (Go + Python + K8s)
        run: semgrep scan --config auto --error --severity ERROR --severity WARNING
      - name: Run Semgrep (Kubernetes-specific rules)
        run: semgrep scan --config p/kubernetes deploy/ --error --severity ERROR --severity WARNING
