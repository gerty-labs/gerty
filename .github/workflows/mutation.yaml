name: Mutation Testing

on:
  push:
    branches: [main]

# Mutation testing is slow (~10-30 min). Run on push to main only, not PRs.
jobs:
  go-mutation:
    name: Go (gremlins)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'
      - uses: go-gremlins/gremlins-action@e5dc59ad56bda9b70d8b64f9499c44d0fa318a08 # v1
        with:
          version: "latest"
          args: "unleash --tags='!integration' --threshold-efficacy 0.60"
          workdir: "."

  python-mutation:
    name: Python (mutmut)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install mutmut pytest
          pip install -e ".[train,eval]" 2>/dev/null || true
      - name: Restore mutmut cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .mutmut-cache
          key: mutmut-${{ github.ref }}-${{ hashFiles('ml/**/*.py') }}
          restore-keys: |
            mutmut-${{ github.ref }}-
            mutmut-refs/heads/main-
      - name: Run mutmut
        run: |
          mutmut run --paths-to-mutate=ml/dataset/generate_synthetic.py \
            --no-progress --CI || true
      - name: Show results
        if: always()
        run: mutmut results || true
      - name: Generate HTML report
        if: always()
        run: mutmut html || true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: mutation-report-python
          path: html/
