apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "gerty.fullname" . }}
  labels:
    {{- include "gerty.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "gerty.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "gerty.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
