{{- if .Values.slm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gerty.fullname" . }}-slm
  labels:
    {{- include "gerty.labels" . | nindent 4 }}
    app.kubernetes.io/component: slm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "gerty.name" . }}
      app.kubernetes.io/component: slm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "gerty.name" . }}
        app.kubernetes.io/component: slm
    spec:
      serviceAccountName: {{ include "gerty.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      {{- if not .Values.slm.persistence.enabled }}
      initContainers:
        - name: model-loader
          image: {{ include "gerty.model.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - name: model-storage
              mountPath: /shared
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      {{- end }}
      containers:
        - name: llama-cpp
          image: {{ include "gerty.slm.image" . }}
          args:
            - "--model"
            - "{{ .Values.slm.model.path }}"
            {{- range .Values.slm.args }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.slm.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: model-storage
              mountPath: /models
      volumes:
        - name: model-storage
          {{- if .Values.slm.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "gerty.fullname" . }}-model
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gerty.fullname" . }}-slm
  labels:
    {{- include "gerty.labels" . | nindent 4 }}
    app.kubernetes.io/component: slm
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "gerty.name" . }}
    app.kubernetes.io/component: slm
{{- if .Values.slm.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "gerty.fullname" . }}-model
  labels:
    {{- include "gerty.labels" . | nindent 4 }}
    app.kubernetes.io/component: slm
spec:
  # ReadWriteOnce used because ReadOnlyMany requires specific storage class support.
  # The model file is read-only at runtime; the PVC is writable only for initial upload.
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.slm.persistence.size }}
  {{- if .Values.slm.persistence.storageClass }}
  storageClassName: {{ .Values.slm.persistence.storageClass }}
  {{- end }}
{{- end }}
{{- end }}
