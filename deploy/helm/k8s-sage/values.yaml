nameOverride: ""
fullnameOverride: ""

image:
  registry: ""
  tag: "latest"
  pullPolicy: IfNotPresent

agent:
  image:
    repository: k8s-sage-agent
  resources:
    requests:
      cpu: 50m
      memory: 50Mi
    limits:
      cpu: 100m
      memory: 100Mi
  scrapeInterval: "30s"
  pushInterval: "5m"
  nodeSelector: {}
  tolerations: []

server:
  image:
    repository: k8s-sage-server
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
    port: 8080
  nodeSelector: {}
  tolerations: []

slm:
  enabled: false
  image:
    repository: ghcr.io/ggerganov/llama.cpp
    tag: server
  model: /models/k8s-sage-q4.gguf
  args:
    - "--ctx-size"
    - "1024"
    - "--threads"
    - "2"
    - "--port"
    - "8080"
  resources:
    requests:
      cpu: "1"
      memory: 2.5Gi
    limits:
      cpu: "2"
      memory: 3Gi
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

grafana:
  dashboards:
    enabled: false

networkPolicy:
  enabled: true
  allowExternalIngress: true

slack:
  enabled: false
  webhookURL: ""
  channel: "#k8s-sage"
  digestInterval: "1h"
  minSeverity: "optimisation"
