apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-sage.fullname" . }}-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-sage.server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels:
      {{- include "k8s-sage.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "k8s-sage.server.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "k8s-sage.serviceAccountName" . }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: {{ include "k8s-sage.server.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            {{- if .Values.slm.enabled }}
            - name: SLM_URL
              value: "http://{{ include "k8s-sage.fullname" . }}-slm:8080"
            {{- end }}
            {{- if .Values.slack.enabled }}
            - name: SLACK_WEBHOOK_URL
              value: {{ .Values.slack.webhookURL | quote }}
            - name: SLACK_CHANNEL
              value: {{ .Values.slack.channel | quote }}
            - name: SLACK_DIGEST_INTERVAL
              value: {{ .Values.slack.digestInterval | quote }}
            - name: SLACK_MIN_SEVERITY
              value: {{ .Values.slack.minSeverity | quote }}
            {{- end }}
          resources:
            requests:
              cpu: {{ .Values.server.resources.requests.cpu }}
              memory: {{ .Values.server.resources.requests.memory }}
            limits:
              cpu: {{ .Values.server.resources.limits.cpu }}
              memory: {{ .Values.server.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
