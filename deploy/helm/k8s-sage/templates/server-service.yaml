apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-sage.fullname" . }}-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-sage.server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - port: {{ .Values.server.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "k8s-sage.server.selectorLabels" . | nindent 4 }}
