{{- if .Values.grafana.dashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8s-sage.fullname" . }}-grafana-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-sage.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  k8s-sage-dashboard.json: |-
    {{- .Files.Get "files/k8s-sage-dashboard.json" | nindent 4 }}
{{- end }}
