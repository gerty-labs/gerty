{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "k8s-sage.fullname" . }}-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-sage.server.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "k8s-sage.server.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow agents to push reports
    - from:
        - podSelector:
            matchLabels:
              {{- include "k8s-sage.agent.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    # Allow CLI / external access (configurable)
    {{- if .Values.networkPolicy.allowExternalIngress }}
    - ports:
        - protocol: TCP
          port: 8080
    {{- end }}
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.slm.enabled }}
    # Allow server to reach SLM
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "k8s-sage.name" . }}
              app.kubernetes.io/component: slm
      ports:
        - protocol: TCP
          port: 8080
    {{- end }}
    {{- if .Values.slack.enabled }}
    # Allow outbound HTTPS for Slack webhooks
    - to: []
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "k8s-sage.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-sage.agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "k8s-sage.agent.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow agent to push to server
    - to:
        - podSelector:
            matchLabels:
              {{- include "k8s-sage.server.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    # Allow agent to reach kubelet (host network)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 10250
{{- end }}
