{{- if .Values.slm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-sage.fullname" . }}-slm
  labels:
    {{- include "k8s-sage.labels" . | nindent 4 }}
    app.kubernetes.io/component: slm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "k8s-sage.name" . }}
      app.kubernetes.io/component: slm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "k8s-sage.name" . }}
        app.kubernetes.io/component: slm
    spec:
      serviceAccountName: {{ include "k8s-sage.serviceAccountName" . }}
      containers:
        - name: llama-cpp
          image: "{{ .Values.slm.image.repository }}:{{ .Values.slm.image.tag }}"
          args:
            - "--model"
            - "{{ .Values.slm.model }}"
            {{- range .Values.slm.args }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.slm.resources | nindent 12 }}
          volumeMounts:
            - name: model-storage
              mountPath: /models
      volumes:
        - name: model-storage
          {{- if .Values.slm.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "k8s-sage.fullname" . }}-model
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-sage.fullname" . }}-slm
  labels:
    {{- include "k8s-sage.labels" . | nindent 4 }}
    app.kubernetes.io/component: slm
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "k8s-sage.name" . }}
    app.kubernetes.io/component: slm
{{- if .Values.slm.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "k8s-sage.fullname" . }}-model
  labels:
    {{- include "k8s-sage.labels" . | nindent 4 }}
    app.kubernetes.io/component: slm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.slm.persistence.size }}
  {{- if .Values.slm.persistence.storageClass }}
  storageClassName: {{ .Values.slm.persistence.storageClass }}
  {{- end }}
{{- end }}
{{- end }}
