base_model: ai21labs/AI21-Jamba-Reasoning-3B
output_dir: output/k8s-sage-lora

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - x_proj
    - in_proj
    - out_proj
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16

training:
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_steps: 100
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 2048
  bf16: true
  weight_decay: 0.01
  eval_strategy: steps
  eval_steps: 100
  save_strategy: steps
  save_steps: 200
  logging_steps: 10

data:
  train_file: ml/dataset/data/training_data.jsonl
  eval_split: 0.1
