apiVersion: apps/v1
kind: Deployment
metadata:
  name: best-effort
  labels:
    app: best-effort
spec:
  replicas: 1
  selector:
    matchLabels:
      app: best-effort
  template:
    metadata:
      labels:
        app: best-effort
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sleep", "infinity"]
