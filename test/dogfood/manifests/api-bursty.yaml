apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-bursty
  labels:
    app: api-bursty
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-bursty
  template:
    metadata:
      labels:
        app: api-bursty
    spec:
      containers:
        - name: api
          image: nginx:1.27-alpine
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 512Mi
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: api-bursty
  labels:
    app: api-bursty
spec:
  selector:
    app: api-bursty
  ports:
    - port: 80
      targetPort: 80
