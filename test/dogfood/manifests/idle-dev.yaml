apiVersion: apps/v1
kind: Deployment
metadata:
  name: idle-dev
  labels:
    app: idle-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: idle-dev
  template:
    metadata:
      labels:
        app: idle-dev
    spec:
      containers:
        - name: sleeper
          image: busybox:1.36
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
